}

function updateTimer() {
    if(isFinished) return;
    let m = Math.floor(timeLeft/60);
    let s = timeLeft%60;
    document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
    if(timeLeft<=0) finish();
    timeLeft--;
}

function showQuestion() {
    const item = soalData[currentIdx];
    let html = `
    <div class="question-box">
        <h3>Soal No ${item.n} dari 50</h3>
        <p style="font-size:18px; line-height:1.5;">${item.q}</p>
        ${item.o.map((opt, i) => `
            <div class="option ${answers[currentIdx] === i ? 'selected' : ''}" onclick="selectOpt(${i})">
                <b style="margin-right:10px">${String.fromCharCode(65+i)}.</b> ${opt}
            </div>
        `).join('')}
    </div>`;
    document.getElementById('question-container').innerHTML = html;
}

function selectOpt(i) {
    if(isFinished) return;
    answers[currentIdx] = i;
    showQuestion();
    renderGrid();
    if (currentIdx < soalData.length - 1) {
        setTimeout(() => {
            currentIdx++;
            showQuestion();
            renderGrid();
        }, 400);
    }
}

function renderGrid() {
    let html = '';
    soalData.forEach((_, i) => {
        let cls = (i === currentIdx) ? 'active' : (answers[i] !== undefined ? 'answered' : '');
        html += `<div class="nav-item ${cls}" onclick="jump(${i})">${i+1}</div>`;
    });
    document.getElementById('grid-nav').innerHTML = html;
}

function jump(i) { currentIdx = i; showQuestion(); renderGrid(); }
function next() { if(currentIdx < soalData.length-1) jump(currentIdx+1); }
function prev() { if(currentIdx > 0) jump(currentIdx-1); }

function tryFinish() { if(confirm('Selesai?')) finish(); }

function finish() {
    isFinished = true;
    clearInterval(timerInterval);
    let benar = 0;
    let review = '';
    soalData.forEach((item, idx) => {
        const userAns = answers[idx];
        const isCorrect = userAns === item.a;
        if(isCorrect) benar++;
        review += `<div style="border-bottom:2px solid #eee; padding:20px 0;">
            <p><b>SOAL NO ${item.n}</b></p>
            <p>${item.q}</p>
            <p>Jawaban Anda: ${userAns !== undefined ? String.fromCharCode(65+userAns) : '-'} ${isCorrect ? '✅' : '❌'}</p>
            <p>Kunci: ${String.fromCharCode(65+item.a)}</p>
            <div class="pembahasan-box"><b>PEMBAHASAN:</b><br>${item.p}</div>
        </div>`;
    });
    document.getElementById('quiz-screen').style.display='none';
    document.getElementById('result-screen').style.display='block';
    document.getElementById('final-score').innerText = (benar * 2);
    document.getElementById('display-name').innerText = document.getElementById('userName').value;
    document.getElementById('review-area').innerHTML = review;
    window.scrollTo(0,0);
}

function downloadPDF() {
    const { jsPDF } = window.jspdf;
    html2canvas(document.getElementById('result-screen')).then(canvas => {
        const imgData = canvas.toDataURL('image/png');
        const pdf = new jsPDF();
        pdf.addImage(imgData, 'PNG', 10, 10, 190, 0);
        pdf.save('Hasil_CAT_PU1.pdf');
    });
}
